		<script type="text/javascript">
			
			var table = null;
			var last_id = 0;
		
			function doPoll(){
				console.log("Starting Poll with last_id: " + last_id);
				$.get('http://rexfault.net/api/live_poll.php?last_id=' + last_id).done( function(data) 
				{
					//Process Data Here
					//table.rows.add(data).draw();
					var processedData = JSON.parse(data);
					for(let i = 0; i< processedData.length; i++) {
						if (processedData[i][0] > last_id)
							last_id = processedData[i][0];
							console.log("last_id set to: " + last_id);
					}
					table.rows.add(processedData).draw(false);
					//console.log(data);
				}).always(function(data) {
				 setTimeout(doPoll, 5000);
			});
}
		
			$(document).ready( function () {
				//$('#alarmData').DataTable();
				table = new DataTable("#alarmData", {
					order: [[0, 'desc']]
				});
				doPoll();
			} );
		</script>
